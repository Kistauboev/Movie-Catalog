<div class="login-container">
  <div class="login-card">
    <h1>{{ isRegisterMode ? "Create Account" : "Sign In" }}</h1>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          required
        />
      </div>

      <div class="form-group" *ngIf="isRegisterMode">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? "Loading..." : isRegisterMode ? "Register" : "Login" }}
      </button>
    </form>

    <div class="toggle-mode">
      <span *ngIf="isRegisterMode">
        Already have an account?
        <a (click)="toggleRegisterMode()">Sign In</a>
      </span>
      <span *ngIf="!isRegisterMode">
        Don't have an account?
        <a (click)="toggleRegisterMode()">Create one</a>
      </span>
    </div>
  </div>
</div>
